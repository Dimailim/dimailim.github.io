    <script>
		(function () {
		    const clientHasDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = clientHasDarkTheme ? 'dark' : 'light';
			document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
